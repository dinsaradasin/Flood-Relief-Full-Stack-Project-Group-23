<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update / Delete User</title>
    <link rel="stylesheet" href="style.css">
    
</head>
<body>
<div class="menubar">
		<div class="menudiv">
			<div class="logo"><a>Update Relief Request</a> </div>
			<ul>
				<li><a href="user_dashboard.html">Dashboard</a></li>
                <li><a href="index.html">Logout</a></li>
                
	
    
			</ul>
        </div>
</div>


<div class="content">
    <input type="text" id="req_id" placeholder="Enter Request_ID" required>
    <div class="btn">
        <button type="button" class="search" onclick="search_record()">Search</button>
    </div>
</div>

<div class="content">


     <form id="request_form">
       <input type="text" name="req_id" id="f_req_id" placeholder="Request_ID" required>
        <input type="text" name="contact_name" id="contact_name" placeholder="Contact Person Name" >
        <input type="text" id="contact_number" name="contact_number" placeholder="Contact Number" >
        <textarea name="address" id="address" placeholder="Address" ></textarea>
        <input type="number" id="family" name="family" placeholder="Number of Family Members" >

        <select name="district" id="district">
            <option value="">Select District</option>

            <option value="Colombo">Colombo</option>
            <option value="Gampaha">Gampaha</option>
            <option value="Kalutara">Kalutara</option>
             <option value="Matara">Matara</option>
            <option value="Galle">Galle</option>
            <option value="Hambanthota">Hambanthota</option>
             <option value="Kegalle">Kegalle</option>
            <option value="monaragala">monaragala</option>
            <option value="Badulla">Badulla</option>
            <option value="Trinco">Trinco</option>
            <option value="Batticaloa">Batticaloa</option>
            <option value="Ampara">Ampara</option>
            <option value="Kandy">Kandy</option>
            <option value="Matale">Matale</option>
            <option value="Nuwara Eliya">Nuwara Eliya</option>
            <option value="Anuradhapura">Anuradhapura</option>
            <option value="Polonnaruwa">Polonnaruwa</option>
            <option value="Kurunagala">Kurunagala</option>
            <option value="Puththalama">Puththalama</option>
            <option value="Jaffna">Jaffna</option>
            <option value="Kilinochchi">Kilinochchi</option>
            <option value="Mulathivu">Mulathivu</option>
            <option value="Mannar">Mannar</option>
            <option value="Vavuniya">Vavuniya</option>
             



        </select>

        <input type="text" id="d_secretariat"  name="d_secretariat" placeholder="Divisional Secretariat" >
        <input type="text" id="gn_division"  name="gn_division" placeholder="GN Division" >

        <select name="relief_type" id="relief_type"  >
            <option value="">Type of Relief</option>
            <option value="Food">Food</option>
            <option value="Water">Water</option>
            <option value="Medicine">Medicine</option>
            <option value="Shelter">Shelter</option>
        </select>

        <select name="flood_severity" id="flood_severity" >

            <option value="">Flood Severity</option>
            <option value="Low">Low</option>
            <option value="Medium">Medium</option>
            <option value="High">High</option>

        </select>

       
        <div class="btn">
            <button type="button" class="btn_up" onclick="update_record()">Update</button>
            <button type="button" class="btn_del" onclick="delete_record()">Delete</button>
        </div>
    </form>
    
</div>


   
        
              

    <script src="user_update.js"></script>

</body>
</html>
