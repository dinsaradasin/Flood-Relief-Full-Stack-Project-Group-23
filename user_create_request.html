<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Relief Request</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="menubar">
		<div class="menudiv">
			<div class="logo"><a>Create Relief Request</a> </div>
			<ul>
                <li><a href="user_dashboard.html">Dashboard</a></li>
                <li><a href="index.html">Logout</a></li>
	
    
			</ul>
        </div></div>

<div class="content">


     <form id="requestForm">
       
        <input type="text" name="contact_name" placeholder="Contact Person Name" required>
        <input type="text" name="contact_number" placeholder="Contact Number" required>
        <textarea name="address" placeholder="Address" required></textarea>
        <input type="number" name="family_members" placeholder="Number of Family Members" required>

        <select name="district" required>
            <option value="">Select District</option>

            <option value="Colombo">Colombo</option>
            <option value="Gampaha">Gampaha</option>
            <option value="Kalutara">Kalutara</option>
             <option value="Matara">Matara</option>
            <option value="Galle">Galle</option>
            <option value="Hambanthota">Hambanthota</option>
             <option value="Kegalle">Kegalle</option>
            <option value="monaragala">monaragala</option>
            <option value="Badulla">Badulla</option>
            <option value="Trinco">Trinco</option>
            <option value="Batticaloa">Batticaloa</option>
            <option value="Ampara">Ampara</option>
            <option value="Kandy">Kandy</option>
            <option value="Matale">Matale</option>
            <option value="Nuwara Eliya">Nuwara Eliya</option>
            <option value="Anuradhapura">Anuradhapura</option>
            <option value="Polonnaruwa">Polonnaruwa</option>
            <option value="Kurunagala">Kurunagala</option>
            <option value="Puththalama">Puththalama</option>
            <option value="Jaffna">Jaffna</option>
            <option value="Kilinochchi">Kilinochchi</option>
            <option value="Mulathivu">Mulathivu</option>
            <option value="Mannar">Mannar</option>
            <option value="Vavuniya">Vavuniya</option>
             



        </select>

        <input type="text" name="d_secretariat" placeholder="Divisional Secretariat" required>
        <input type="text" name="gn_division" placeholder="GN Division" required>

        <select name="relief_type" required>
            <option value="">Type of Relief</option>
            <option value="Food">Food</option>
            <option value="Water">Water</option>
            <option value="Medicine">Medicine</option>
            <option value="Shelter">Shelter</option>
        </select>

        <select name="flood_severity" required>

            <option value="">Flood Severity</option>
            <option value="Low">Low</option>
            <option value="Medium">Medium</option>
            <option value="High">High</option>

        </select>

        <textarea name="description" placeholder="Additional Details"></textarea>

        <button type="submit">Submit Request</button>
    </form>
    
</div>
<script src="user_create_request.js"></script>
</body>
</html>
